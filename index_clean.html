 if(!Object.keys(tots).length)return h+'<div class="empty"><div class="eico">😌</div><div class="etit">No orders for this date</div><div class="esub">Nothing to prepare!</div></div>';
 Object.keys(tots).forEach(function(it){
 var c=items[it]||{bg:"#8B6B4A",light:"#F5EDE6",emoji:"🍽️"},q=tots[it];
 h+='<div class="prepcard" style="border-left:5px solid '+c.bg+'">'+
 '<div class="prepico" style="background:'+c.light+'">'+c.emoji+'</div>'+
 '<div><div class="prepn">'+it+'</div><div class="preps">from '+orders.length+' order'+(orders.length!==1?"s":"")+'</div></div>'+
 '<div class="prepct" style="background:'+c.bg+'"><div class="prepnum">'+q+'</div><div class="prepunit">units</div></div></div>';
 });
 h+='<div class="card"><div class="ctitle">👥 Orders ('+orders.length+')</div>';
 orders.forEach(function(o){
 var st=ST[o.status];
 h+='<div class="cust-row"><div style="display:flex;align-items:center;gap:8px">'+
 '<div class="cavt">'+o.customerName.charAt(0).toUpperCase()+'</div>'+
 '<div><div style="font-weight:700;font-size:14px;color:#222">'+o.customerName+'</div>'+
 '<div style="font-size:11px;color:#bbb">'+Object.keys(o.items).map(function(i){return o.items[i]+"× "+i;}).join(", ")+'</div></div></div>'+
 '<span class="sbadge" style="background:'+st.bg+';color:'+st.color+'">'+st.icon+' '+st.label+'</span></div>';
 });
 h+='</div>';return h;
}

function renderNewOrd(){
 var items=gi(),ik=Object.keys(items);
 var h='<div class="card"><div class="ctitle">'+(editId?'✏️ Edit Order':'👤 New Order')+'</div>'+
 '<input class="sinp" id="noName" placeholder="Customer name *" value="'+newOrd.cname+'" oninput="newOrd.cname=this.value"/>'+
 '<div style="font-size:12px;font-weight:700;color:#aaa;margin-bottom:6px;text-transform:uppercase">Delivery / Pickup Date</div>'+
 '<input class="sinp" type="date" id="noDate" value="'+newOrd.date+'" onchange="newOrd.date=this.value;renderOrders()"/>'+
 (isAdv(newOrd.date)?'<div class="advnotice">⏰ Advance order for '+fdate(newOrd.date)+'</div>':'')+
 '</div>';
 h+='<div class="card"><div class="ctitle">🛒 Select Items</div>';
 if(!ik.length){h+='<div style="color:#ccc;font-size:13px">No items. Add via ⚙️ Manage.</div>';}
 else{
 ik.forEach(function(item){
 var it=items[item],q=newOrd.items[item]||0;
 h+='<div class="noitem">'+
 '<div style="display:flex;align-items:center;gap:10px">'+
 '<div style="width:36px;height:36px;border-radius:11px;background:'+it.light+';display:flex;align-items:center;justify-content:center;font-size:18px">'+it.emoji+'</div>'+
 '<div><div style="font-weight:700;font-size:14px;color:#222">'+item+'</div><div style="font-size:11px;color:#bbb">AED '+Number(it.price).toFixed(2)+'</div></div></div>'+
 '<div style="display:flex;align-items:center;gap:6px">'+
 '<button style="width:30px;height:30px;border-radius:9px;border:none;background:#f5f5f5;font-size:16px;font-weight:700;color:#666;cursor:pointer" onclick="setNOItem(\''+item+'\','+(q-1)+')">−</button>'+
 '<span style="width:32px;text-align:center;font-weight:900;font-size:16px;color:'+(q>0?it.bg:"#ccc")+'">'+q+'</span>'+
 '<button style="width:30px;height:30px;border-radius:9px;border:none;background:'+it.bg+';font-size:16px;font-weight:700;color:#fff;cursor:pointer" onclick="setNOItem(\''+item+'\','+(q+1)+')">+</button>'+
 '</div></div>';
 });
 var tot=Object.keys(newOrd.items).reduce(function(s,i){return s+newOrd.items[i]*(items[i]&&items[i].price||0);},0);
 if(Object.keys(newOrd.items).length)h+='<div style="margin-top:12px;padding:10px 0;border-top:2px solid #f5f5f5;display:flex;justify-content:space-between"><span style="font-weight:700;color:#555;font-size:14px">Order Total</span><span style="font-weight:900;color:#C1522A;font-size:16px">'+cur(tot)+'</span></div>';
 }
 h+='</div>';
 h+='<div class="card"><div class="ctitle">📝 Note (optional)</div><textarea class="stxt" id="noNote" placeholder="Any special instructions...">'+newOrd.note+'</textarea></div>';

h+=’<div class="nobtns"><button class="cancelbtn" onclick="cancelNO()">Cancel</button><button class="savebtn" onclick="saveNO()">’+(editId?‘✓ Update Order’:‘✓ Save Order’)+’</button></div>’;
return h;
}
function setNOItem(item,qty){
qty=Math.max(0,parseInt(qty)||0);
if(qty===0)delete newOrd.items[item];else newOrd.items[item]=qty;
renderOrders();
}
function saveNO(){
var name=(document.getElementById(“noName”)||{}).value||newOrd.cname||””;
name=name.trim();
if(!name)return showToast(“Enter customer name”,true);
if(!Object.keys(newOrd.items).length)return showToast(“Add at least one item”,true);
var note=(document.getElementById(“noNote”)||{}).value||newOrd.note||””;
var items=gi();
if(editId){
// Update existing order — keep original prices for existing items, snapshot new ones
var orders=go();
var orig=orders.find(function(x){return x.id===editId;})||{};
var prices=Object.assign({},orig.prices||{});
Object.keys(newOrd.items).forEach(function(it){
if(!prices[it])prices[it]=items[it]?items[it].price:0;
});
var updated=orders.map(function(o){
return o.id===editId?Object.assign({},o,{customerName:name,date:newOrd.date,items:Object.assign({},newOrd.items),prices:prices,note:note}):o;
});
so(updated);
editId=null;newOrd={cname:””,date:tday(),items:{},note:””};
curOV=“list”;showToast(“Order updated ✓”);renderOrders();updateHeader();
} else {
// New order — snapshot current prices
var prices={};
Object.keys(newOrd.items).forEach(function(it){prices[it]=items[it]?items[it].price:0;});
var o={id:Date.now(),customerName:name,date:newOrd.date,items:Object.assign({},newOrd.items),prices:prices,note:note,status:“pending”};
var orders=go();orders.unshift(o);so(orders);
newOrd={cname:””,date:tday(),items:{},note:””};
curOV=“list”;showToast(“Order for “+o.customerName+” saved ✓”);renderOrders();updateHeader();
}
}
function cancelNO(){newOrd={cname:””,date:tday(),items:{},note:””};curOV=“list”;editId=null;renderOrders();}
function startEdit(id){
var o=go().find(function(x){return x.id===id;});
if(!o)return;
editId=id;
newOrd={cname:o.customerName,date:o.date,items:Object.assign({},o.items),note:o.note||””};
curOV=“new”;expandId=null;renderOrders();
}

// ── EXPENSES ──
function renderExpenses(){
var el=document.getElementById(“v-Expenses”),day=gday(selDate);
var h=’<div class="slbl">Capital Expenses — ‘+fdate(selDate)+’</div>’;
h+=’<div class="card"><div class="ctitle">➕ Add Expense</div>’+
‘<input class="sinp" id="expLbl" placeholder="Label (e.g. Oil, Flour...)"/>’+
‘<div class="exprow"><div class="expaed"><span class="expaedl">AED</span><input class="expaedinp" id="expAmt" type="number" placeholder="Amount"/></div>’+
‘<button class="addexpbtn" onclick="addExp()">Add</button></div></div>’;
var exps=day.expenses||[];
if(!exps.length){h+=’<div style="text-align:center;color:#ccc;font-size:14px;font-weight:700;margin-top:36px">No expenses for this day</div>’;}
else{
exps.forEach(function(e){
h+=’<div class="card expitem"><div><div class="expn">’+e.label+’</div><div class="expa">’+cur(e.amount)+’</div></div>’+
‘<button class="expd" onclick="delExp('+e.id+')">✕</button></div>’;
});
var tot=exps.reduce(function(s,e){return s+e.amount;},0);
h+=’<div class="exptot"><span style="font-weight:700;color:#555">Total Expenses</span><span style="font-weight:900;color:#C1522A;font-size:16px">’+cur(tot)+’</span></div>’;
}
el.innerHTML=h;
}
function addExp(){
var lbl=(document.getElementById(“expLbl”)||{}).value||””;
var amt=parseFloat((document.getElementById(“expAmt”)||{}).value||””);
if(!lbl||!amt)return showToast(“Fill label & amount”,true);
var d=gd();if(!d[selDate])d[selDate]={sales:{},expenses:[]};
(d[selDate].expenses=d[selDate].expenses||[]).push({id:Date.now(),label:lbl,amount:amt});
sd(d);showToast(“Expense added ✓”);render();
}
function delExp(id){
var d=gd();
if(d[selDate])d[selDate].expenses=(d[selDate].expenses||[]).filter(function(e){return e.id!==id;});
sd(d);render();
}

// ── REPORT ──
function renderReport(){
var el=document.getElementById(“v-Report”),items=gi(),ik=Object.keys(items),data=gd();
var h=’<div class="rtabs">’+
‘<button class=“rtab’+(rtype===“week”?” on”:””)+’” onclick=“rtype='week';renderReport()”>This Week</button>’+
‘<button class=“rtab’+(rtype===“month”?” on”:””)+’” onclick=“rtype='month';renderReport()”>This Month</button>’+
‘</div>’;
var dates=Object.keys(data).filter(function(d){return rtype===“week”?wkey(d)===wkey(tday()):mkey(d)===mkey(tday());});
var rev=0,exp=0,is={};ik.forEach(function(i){is[i]={qty:0,revenue:0};});
dates.forEach(function(d){
var day=data[d]||{};
ik.forEach(function(it){var q=day.sales&&day.sales[it]||0,r=q*(items[it].price||0);if(is[it]){is[it].qty+=q;is[it].revenue+=r;}rev+=r;});
(day.expenses||[]).forEach(function(e){exp+=e.amount;});
});
var profit=rev-exp,margin=rev?((profit/rev)*100).toFixed(1)+”%”:“0%”;
h+=’<div class="slbl">’+(rtype===“week”?“Weekly”:“Monthly”)+’ Summary · ‘+dates.length+’ day’+(dates.length!==1?“s”:””)+’</div>’;
h+=’<div class="sgrid">’+
[[“Revenue”,cur(rev),”#C1522A”,“💰”],[“Expenses”,cur(exp),”#2C5A6A”,“📦”],[“Profit”,cur(profit),profit>=0?”#5C6B3A”:”#C1522A”,“📈”],[“Margin”,margin,”#C8902A”,“📊”]].map(function(x){
return’<div class="scard" style="border-top:3px solid '+x[2]+'"><div class="scico">’+x[3]+’</div><div class="scval" style="color:'+x[2]+'">’+x[1]+’</div><div class="sclbl">’+x[0]+’</div></div>’;
}).join(””)+’</div>’;
h+=’<div class="card"><div style="font-weight:800;font-size:15px;color:#222;margin-bottom:14px">📋 Item Breakdown</div>’;
if(!ik.length)h+=’<div style="color:#ccc;font-size:14px">No items yet</div>’;
ik.forEach(function(item){
var s=is[item]||{qty:0,revenue:0},p=rev?(s.revenue/rev)*100:0,c=items[item];
h+=’<div class="bitem"><div class="brow">’+
‘<div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">’+c.emoji+’</span>’+
‘<div><div style="font-weight:700;font-size:14px;color:#222">’+item+’</div><div style="font-size:11px;color:#bbb;font-weight:600">’+s.qty+’ units</div></div></div>’+
‘<div style="text-align:right"><div style="font-weight:800;font-size:14px;color:'+c.bg+'">’+cur(s.revenue)+’</div><div style="font-size:11px;color:#ccc;font-weight:600">’+p.toFixed(1)+’%</div></div></div>’+
‘<div class="ptrack"><div class="pbar" style="width:'+p+'%;background:'+c.bg+'"></div></div></div>’;
});
h+=’</div>’;
if(!dates.length)h+=’<div style="text-align:center;color:#ccc;font-size:14px;font-weight:700;padding:20px 0">No data for this period yet</div>’;
el.innerHTML=h;
}
